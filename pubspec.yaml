name: socialcall
description: Social Interaction Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP & API
  dio: ^5.4.3

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Real-time
  socket_io_client: ^2.0.3+1

  # WebRTC (peer-to-peer audio/video — no external API)
  flutter_webrtc: ^0.11.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pinput: ^5.0.0
  intl: ^0.19.0
  timeago: ^3.6.1
  gap: ^3.0.1
  flutter_rating_bar: ^4.0.1
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

  # Media
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Payments
  razorpay_flutter: ^1.3.6

  # Notifications (Firebase - add google-services.json to enable)
  # firebase_core: ^3.4.0
  # firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Country code
  country_code_picker: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
