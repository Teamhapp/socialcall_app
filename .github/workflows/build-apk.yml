# ═══════════════════════════════════════════════════════════════════
#  SocialCall — GitHub Actions: Auto-Build APK
#
#  Triggers:
#    • Every push to main branch  → builds debug APK
#    • Every version tag (v1.0.0) → builds release APK + creates GitHub Release
#
#  The APK download link appears in:
#    GitHub → your repo → Actions → latest run → Artifacts
#    GitHub → your repo → Releases (for tagged builds)
# ═══════════════════════════════════════════════════════════════════

name: Build APK

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'          # triggers on tags like v1.0.0, v1.2.3
  pull_request:
    branches: [main]
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Java (required for Android build) ────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Flutter ──────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Install dependencies ───────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 5. Run analysis (catch errors before building) ────────────────
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true   # don't block build on lint warnings

      # ── 6. Build DEBUG APK (fast, for every push) ────────────────────
      - name: Build Debug APK
        run: flutter build apk --debug --no-shrink
        if: "!startsWith(github.ref, 'refs/tags/')"

      # ── 7. Build RELEASE APK (for version tags only) ─────────────────
      - name: Build Release APK
        run: flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/')

      # ── 8. Get version info ───────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "apk_path=build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_OUTPUT
            echo "apk_name=SocialCall-${{ github.ref_name }}-release.apk" >> $GITHUB_OUTPUT
          else
            COMMIT=$(git rev-parse --short HEAD)
            echo "version=debug-${COMMIT}" >> $GITHUB_OUTPUT
            echo "apk_path=build/app/outputs/flutter-apk/app-debug.apk" >> $GITHUB_OUTPUT
            echo "apk_name=SocialCall-debug-${COMMIT}.apk" >> $GITHUB_OUTPUT
          fi

      # ── 9. Rename APK ─────────────────────────────────────────────────
      - name: Rename APK
        run: |
          cp "${{ steps.version.outputs.apk_path }}" \
             "build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"

      # ── 10. Upload APK as artifact (available for 7 days) ─────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 7

      # ── 11. Create GitHub Release (only for version tags) ─────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: SocialCall ${{ github.ref_name }}
          body: |
            ## 📱 SocialCall ${{ github.ref_name }}

            ### Download
            Download the APK below and install on your Android phone.

            > **Enable "Install from unknown sources"** in Android Settings before installing.

            ### What's New
            - See commit history for changes in this release
          files: |
            build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
